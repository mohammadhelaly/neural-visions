services:
    server:
        build:
            context: .
            target: server-dev
        environment:
            KAGGLE_API_TOKEN: ${KAGGLE_API_TOKEN:-}
            KAGGLE_MODEL_HANDLE: ${KAGGLE_MODEL_HANDLE:-mohammadhelaly/visualqna/pytorch/default/2}
            PORT: 5000
            VQNA_FORCE_ARTIFACT_DOWNLOAD: ${VQNA_FORCE_ARTIFACT_DOWNLOAD:-false}
        command:
            - flask
            - --app
            - src.main
            - run
            - --debug
            - --host
            - 0.0.0.0
            - --port
            - "5000"
        ports:
            - "5000:5000"
        volumes:
            - ./server:/app/server
            - artifacts:/app/server/src/artifacts

    client:
        build:
            context: .
            target: client-dev
        environment:
            VITE_BACKEND_BASE_URL: http://localhost:5000
            VITE_USE_POLLING: "true"
        command:
            - npm
            - run
            - dev
            - --
            - --host
            - 0.0.0.0
            - --port
            - "3000"
        ports:
            - "3000:3000"
        depends_on:
            - server
        volumes:
            - ./client:/app/client
            - client_node_modules:/app/client/node_modules

volumes:
    artifacts:
    client_node_modules:
