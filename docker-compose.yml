services:
    web:
        build:
            context: .
            secrets:
                - source: kaggle_api_token
                  target: KAGGLE_API_TOKEN
        environment:
            PORT: ${PORT:-5000}
            WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
            GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-180}
        ports:
            - "${PORT:-5000}:${PORT:-5000}"

secrets:
    kaggle_api_token:
        environment: KAGGLE_API_TOKEN
